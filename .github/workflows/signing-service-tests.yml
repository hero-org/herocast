name: Signing Service Tests

on:
  push:
    paths:
      - 'supabase/functions/farcaster-signer/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/signing-service-tests.yml'
  pull_request:
    paths:
      - 'supabase/functions/farcaster-signer/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/signing-service-tests.yml'

jobs:
  signing-service-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      # Type-check before spinning up Supabase so type regressions fail fast
      # and cheap. Checking the index.ts entrypoint walks the whole import
      # graph (handlers -> lib -> _shared), so a single check covers the
      # function. The browser-side `pnpm check` (tsc) does NOT see this code —
      # the edge function runs on Deno with a different module graph — so this
      # is the only gate that catches edge-function type errors.
      - name: Type-check edge function (deno check)
        run: deno check --config supabase/functions/farcaster-signer/deno.json supabase/functions/farcaster-signer/index.ts

      - name: Start Supabase
        # Exclude services the signer tests don't need. Avoids the inbucket
        # port-bind race (54324) that intermittently fails on GitHub runners
        # when supabase start retries after a container startup hiccup.
        run: supabase start --exclude inbucket,studio,storage-api,realtime,imgproxy,pgadmin-schema-diff,migra,pg-prove,pgbouncer,vector,supavisor

      - name: Reset database
        run: supabase db reset --yes

      - name: Apply pgsodium grants and seed key
        # Connect as supabase_admin (the local-dev superuser; password is the
        # same `postgres` value used for all built-in roles in the supabase
        # CLI image). The `postgres` role in newer CLI images lacks
        # pgsodium_keymaker membership and cannot write to pgsodium.key, so
        # seeding under -U postgres fails with SQLSTATE 42501 — surfacing in
        # seed.ts as P0002 "query returned no rows" from the encrypt trigger.
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -p 54322 -U supabase_admin -d postgres -f supabase/setup/pgsodium_grants.sql
          psql -h localhost -p 54322 -U supabase_admin -d postgres -f supabase/setup/pgsodium_seed_key.sql

      - name: Export Supabase env
        run: |
          STATUS_JSON=$(supabase status --output json)
          ANON_KEY=$(echo "$STATUS_JSON" | jq -r '.ANON_KEY // .anon_key // .api.anon_key')
          if [ -z "$ANON_KEY" ] || [ "$ANON_KEY" = "null" ]; then
            echo "Failed to read anon key from supabase status" >&2
            echo "$STATUS_JSON" >&2
            exit 1
          fi
          echo "SUPABASE_URL=http://localhost:54321" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"

      - name: Seed test users/accounts
        run: deno run --config supabase/functions/farcaster-signer/deno.json --allow-net --allow-env --allow-read supabase/functions/farcaster-signer/tests/seed.ts

      - name: Serve signing function
        run: |
          supabase functions serve farcaster-signer --no-verify-jwt &
          sleep 3

      - name: Run signing service tests
        env:
          SKIP_E2E_TESTS: 'true'
        run: deno test --config supabase/functions/farcaster-signer/deno.json --allow-net --allow-env --allow-read supabase/functions/farcaster-signer/tests/

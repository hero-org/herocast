name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Scope to code changes to skip reviews on docs-only / config-only PRs:
    # paths: ["src/**", "app/**", "pages/**"]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Pin the model. The action's old default (claude-sonnet-4-20250514) was retired
          # and now returns API 404 (not_found_error). claude-sonnet-4-6 is the current
          # Sonnet (drop-in replacement). Swap to "claude-opus-4-8" for deeper reviews.
          model: "claude-sonnet-4-6"

          # Update a single review comment across pushes instead of posting a new one each time.
          use_sticky_comment: true

          # High-signal, terse review. The generic "review for quality/bugs/perf/security/
          # tests, be constructive" prompt produced long essays on every push; this asks for
          # only confirmed, important problems with a hard cap and a one-line LGTM otherwise.
          direct_prompt: |
            Review this PR for HIGH-SIGNAL issues only. Be terse.

            Report ONLY:
            - Correctness bugs (logic errors, races, null/undefined, off-by-one, wrong API use)
            - Security issues (injection, auth/authz, secret or credential exposure)
            - Data-loss or breaking-change risks

            Rules:
            - Max 5 findings, ordered by severity. If there are none, reply with exactly
              "LGTM — no significant issues found." and nothing else.
            - One line per finding: `path:line — the problem — the fix` (fix <= 1 sentence).
            - Skip style, naming, formatting, nitpicks, praise, and any summary of what the
              PR does. Only flag what you are confident is a real problem; do not speculate.

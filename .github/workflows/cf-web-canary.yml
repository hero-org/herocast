name: cf-web-canary

# Deploys the TanStack Start → Cloudflare Workers CANARY (worker: `herocast-web`) on
# every push to the migration branch. The canary is served on its *.workers.dev URL —
# the custom domain cf.herocast.xyz is DISABLED until herocast.xyz DNS moves to Cloudflare
# (it currently uses Namecheap DNS → Vercel; see wrangler.jsonc + spec §6). This is the
# preview app for epic #754 — SEPARATE from the live Next.js/Vercel deploy, and it CANNOT
# affect it:
#   - It only ever runs on `hellno/cloudflare-hosting-state` (branch filter below +
#     a job-level ref guard), so it never fires on `main` or PRs into `main`.
#   - It runs `pnpm web:build` (vite) + `wrangler deploy`, never `next build` / Vercel.
#   - No custom domain ⇒ NO DNS is touched at all; the worker is its own target.
# See docs/migration/phase-2-infra-canary.md + strategy.md.

on:
  push:
    branches: [hellno/cloudflare-hosting-state]
  workflow_dispatch:

# One deploy at a time; cancel an in-flight deploy when a newer commit lands.
concurrency:
  group: cf-web-canary
  cancel-in-progress: true

# Least privilege: the job only reads the repo and talks to Cloudflare via the API
# token. It needs no write scopes on the GitHub repo.
permissions:
  contents: read

jobs:
  # Cheap gate so pushing this workflow BEFORE the CF secrets exist doesn't spam failed
  # runs: if the two Cloudflare secrets aren't set, the deploy job is skipped (neutral,
  # not red). Secrets can't be read in an `if:` directly, so map them to env here.
  guard:
    runs-on: ubuntu-latest
    # Branch isolation (layer 1): the gate itself only runs on the migration branch, so a
    # workflow_dispatch from any other branch produces no deploy.
    if: github.ref == 'refs/heads/hellno/cloudflare-hosting-state'
    outputs:
      configured: ${{ steps.creds.outputs.configured }}
    steps:
      - name: Check Cloudflare credentials are configured
        id: creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CF_TOKEN}" ] && [ -n "${CF_ACCT}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping deploy. Add them in repo Settings → Secrets → Actions (see docs/migration/phase-2-infra-canary.md §7)."
          fi

  deploy:
    needs: guard
    # Run only when the gate saw BOTH secrets AND we're on the migration branch
    # (belt-and-suspenders layer 2 — never deploy from main / another ref).
    if: needs.guard.outputs.configured == 'true' && github.ref == 'refs/heads/hellno/cloudflare-hosting-state'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions are pinned to major tags (@v4) to match the repo convention (build.yaml,
      # edge-functions-typecheck.yml, etc.). Switch to full commit SHAs only if the repo
      # adopts SHA-pinning everywhere — pinning this one workflow alone would be inconsistent.
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Node >= 22: the canary toolchain (wrangler/workerd) requires it. Intentionally
      # NEWER than the live app's CI (build.yaml pins node 20.12.2) — the two build
      # graphs are independent, so this never affects the Next/Vercel build.
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # pnpm v10 skips native postinstall build scripts; esbuild + workerd need their
      # binaries rebuilt or `vite build` / wrangler fail. (R3 in phase-1.md.)
      - name: Rebuild native binaries (esbuild, workerd)
        run: pnpm rebuild esbuild workerd

      # Build the worker bundle → emits dist/server/wrangler.json (the deployable
      # config). VITE_* are inlined at BUILD time (client config, public once bundled);
      # they are OPTIONAL for the probes (which read server secrets at RUNTIME via
      # wrangler secrets). Provide them as repo secrets to light up the browser Supabase
      # client + PostHog on the canary; unset → empty string, the build still succeeds.
      - name: Build canary worker bundle
        run: pnpm web:build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      # Deploy with the repo-pinned wrangler (4.98.0) using the GENERATED config. Capture
      # the workers.dev URL wrangler prints so the next step can smoke the worker that is
      # live RIGHT NOW (no custom DNS needed). Runtime secrets (NEYNAR_API_KEY,
      # SUPABASE_URL, SUPABASE_ANON_KEY) are set ONCE via `wrangler secret put` and persist
      # on the worker across deploys — CI does NOT need them. CI needs ONLY the two
      # Cloudflare auth secrets below.
      - name: Deploy to Cloudflare (herocast-web)
        id: deploy
        run: |
          set -u
          # `| tee` would MASK wrangler's exit code (the pipeline takes tee's 0 — verified:
          # a tokenless deploy still reported success). Check wrangler's status explicitly
          # via PIPESTATUS; do NOT rely on the runner's pipefail being enabled.
          pnpm exec wrangler deploy -c dist/server/wrangler.json | tee deploy.log
          ec=${PIPESTATUS[0]}
          if [ "${ec}" -ne 0 ]; then
            echo "::error::wrangler deploy failed (exit ${ec})"
            exit "${ec}"
          fi
          url="$(grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev' deploy.log | head -n1 || true)"
          echo "worker_url=${url}" >> "$GITHUB_OUTPUT"
          echo "Deployed worker URL: ${url:-<none captured — workers.dev may be disabled>}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # BLOCKING canary gate. The throwaway probes are the per-deploy smoke test
      # (strategy.md — "the probe is the canary on every deploy"). Both are designed to
      # return 200 even with NO secrets set (migration-probe renders the empty state;
      # providers-probe is client-rendered), so this gates purely on "is the freshly
      # deployed worker serving?" — meaningful from the very first deploy, no DNS needed.
      - name: Smoke-check probes on the live worker (blocking)
        run: |
          set -u
          base='${{ steps.deploy.outputs.worker_url }}'
          if [ -z "${base}" ]; then
            echo "::warning::no workers.dev URL captured from deploy output; skipping live smoke"
            exit 0
          fi
          fail=0
          for path in /migration-probe /providers-probe; do
            # A freshly-deployed *.workers.dev route can 404 for a few seconds while it
            # propagates globally (observed on the first deploy). Retry up to 8× before
            # failing. No `-f`: capture the REAL status via -w even on 4xx/5xx (000 on net error).
            code=000
            for attempt in $(seq 1 8); do
              code=$(curl -sS -m 20 -o /dev/null -w '%{http_code}' "${base}${path}") || true
              [ "${code}" = "200" ] && break
              [ "${attempt}" -lt 8 ] && { echo "  ${path} -> ${code} (attempt ${attempt}/8); retry in 8s…"; sleep 8; }
            done
            echo "GET ${base}${path} -> ${code}"
            if [ "${code}" != "200" ]; then
              echo "::error::${base}${path} returned ${code} after retries (expected 200)"
              fail=1
            fi
          done
          exit "${fail}"
      # (A custom-domain smoke for cf.herocast.xyz is intentionally omitted — the domain
      # is disabled until herocast.xyz DNS is on Cloudflare. Re-add a 200-check here when
      # you re-enable the `routes` block in wrangler.jsonc; see phase-2-infra-canary.md §6.)
